[font]
size = 16

[font.normal]
family = "Hack Nerd Font Mono"

[[keyboard.bindings]]
action = "CreateNewWindow"
key = "N"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0002"
key = "P"
mods = "Command"

[window]
decorations = "none"
startup_mode = "Maximized"

[shell]
program = "/opt/homebrew/bin/bash"
args = ["-l"]

[bell]
duration = 1
command = { program = "afplay", args = ["/System/Library/Sounds/Glass.aiff"] }
